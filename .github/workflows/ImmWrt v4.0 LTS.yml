# =====================================================================
# 🔒 [SEALED] OFFICIAL SINGULARITY RELEASE (10.0 企業奇異點版) - ABSOLUTE ZERO
# =====================================================================
# 代號名稱：ImmWrt v4.1.3 LTS - Absolute Zero
# 封版日期：2026年5月 (絕對零度隔離：強制關閉系統 GOENV 干擾)
# =====================================================================

name: Build ImmWrt v4.1 LTS
on:
  workflow_dispatch:
  schedule:
    - cron: '26 18 * * 2,6' # HKT 02:26

concurrency:
  group: immwrt-build
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 240
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        
      - name: Generate Cache Variables
        id: var
        run: echo "week=$(date +'%G-%V')" >> $GITHUB_OUTPUT
        
      - name: Inject SRE Core Utilities
        run: |
          cat << 'EOF' > /tmp/sre_utils.sh
          #!/bin/bash
          retry() {
            local max=3
            local delay=5
            local n=1
            while true; do
              "$@" && break || {
                if [[ $n -lt $max ]]; then
                  ((n++))
                  echo "⚠️ 命令執行失敗，等待 $delay 秒後進行第 $n 次重試..."
                  sleep $delay
                else
                  echo "❌ 致命錯誤：命令在 $max 次嘗試後依然失敗！"
                  exit 1
                fi
              }
            done
          }
          EOF
          chmod +x /tmp/sre_utils.sh

      - name: Free Disk Space
        run: |
          set -euo pipefail
          echo "開始精準清理無用環境，釋放極限空間與 Inode..."
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift \
          /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL /opt/microsoft \
          /usr/local/share/edge_driver /usr/local/.ghcup /usr/share/miniconda /opt/az
          if command -v docker >/dev/null 2>&1; then sudo docker system prune -af || true; fi
          sudo apt-get clean
          
      - name: Init Environment
        run: |
          set -euo pipefail
          sudo swapoff -a || true
          sudo rm -f /swapfile || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          sudo apt-get update -qq
          sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib \
          gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget jq ccache golang-go
          
      - name: Clone Source & PassWall
        run: |
          set -euo pipefail
          source /tmp/sre_utils.sh
          retry git clone -b v25.12.0-rc2 --single-branch --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
            
      - name: Feeds & Official Sources
        run: |
          set -euo pipefail
          source /tmp/sre_utils.sh
          cd openwrt
          
          retry ./scripts/feeds update -a
          
          rm -rf feeds/luci/applications/luci-app-fstab
          ./scripts/feeds uninstall luci-app-fstab || true
          ./scripts/feeds uninstall luci-app-passwall xray-core sing-box || true
          
          rm -rf package/openwrt-passwall-packages package/openwrt-passwall
          retry git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/openwrt-passwall-packages
          retry git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall.git package/openwrt-passwall
          
          retry ./scripts/feeds install -a
          
          MENU_DIR="feeds/luci/modules/luci-mod-system/root/usr/share/luci/menu.d"
          if [ -d "$MENU_DIR" ]; then
            for f in $MENU_DIR/*.json; do
              [ -f "$f" ] || continue
              jq 'del(."admin/system/mounts", ."admin/services/mounts")' "$f" > "$f.tmp" && mv "$f.tmp" "$f" || true
            done
          fi
          
      - name: Hardened Config & Ultimate Injection
        run: |
          set -euo pipefail
          cd openwrt
          
          mkdir -p files/etc/sysctl.d files/etc/uci-defaults
          cat > files/etc/sysctl.d/99-bbr.conf << 'EOF'
          net.core.default_qdisc=fq_codel
          net.ipv4.tcp_congestion_control=bbr
          net.ipv4.tcp_fastopen=3
          net.ipv4.tcp_mtu_probing=1
          net.ipv4.tcp_syncookies=1
          net.ipv4.tcp_fin_timeout=30
          EOF
          
          cat > files/etc/uci-defaults/99-init-settings << 'EOF'
          #!/bin/sh
          uci set luci.main.mediaurlbase='/luci-static/argon'
          uci commit luci
          [ -f /etc/init.d/upnpd ] && /etc/init.d/upnpd disable
          for conf in network passwall; do
            [ -f /etc/config/$conf ] && chmod 600 /etc/config/$conf
          done
          exit 0
          EOF
          chmod +x files/etc/uci-defaults/99-init-settings
          
          rm -f .config
          {
            echo "CONFIG_TARGET_x86=y"
            echo "CONFIG_TARGET_x86_64=y"
            echo "CONFIG_TARGET_x86_64_DEVICE_generic=y"
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1536"
            echo "CONFIG_TARGET_ROOTFS_SQUASHFS=y"
            echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_TARGET_ROOTFS_TARGZ=n"
            echo "CONFIG_LUCI_LANG_zh-cn=y"
            echo "CONFIG_PACKAGE_luci-light=y"
            echo "CONFIG_PACKAGE_luci-theme-argon=y"
            echo "CONFIG_PACKAGE_luci-app-argon-config=y"
            echo "CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-passwall=y"
            echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y"
            echo "CONFIG_PACKAGE_xray-core=y"
            echo "CONFIG_PACKAGE_sing-box=y"
            echo "CONFIG_PACKAGE_geoview=y"
            echo "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client=n"
            echo "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Server=n"
            echo "CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus=n"
            echo "CONFIG_PACKAGE_smartdns=y"
            echo "CONFIG_PACKAGE_luci-app-smartdns=y"
            echo "CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ddns=y"
            echo "CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y"
            echo "CONFIG_PACKAGE_ddns-scripts-cloudflare=y"
            echo "CONFIG_PACKAGE_luci-app-upnp=y"
            echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"
            echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-advanced-reboot=y"
            echo "CONFIG_PACKAGE_luci-i18n-advanced-reboot-zh-cn=y"
            echo "CONFIG_PACKAGE_qemu-ga=y"
            echo "CONFIG_PACKAGE_htop=y"
            echo "CONFIG_PACKAGE_nano=y"
            echo "CONFIG_PACKAGE_unzip=y"
            echo "CONFIG_PACKAGE_curl=y"
            echo "CONFIG_PACKAGE_wget-ssl=y"
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"
            echo "CONFIG_PACKAGE_kmod-sched-core=y"
            echo "CONFIG_PACKAGE_kmod-virtio-net=y"
            echo "CONFIG_PACKAGE_kmod-virtio-blk=y"
            echo "CONFIG_PACKAGE_kmod-nft-offload=y"
            echo "CONFIG_PACKAGE_firewall4=y"
            echo "CONFIG_PACKAGE_block-mount=n"
            echo "CONFIG_PACKAGE_luci-app-fstab=n"
            echo "CONFIG_PACKAGE_irqbalance=y"
            echo "CONFIG_PACKAGE_ethtool=y"
            echo "CONFIG_PACKAGE_ca-bundle=y"
            echo "CONFIG_PACKAGE_ca-certificates=y"
          } >> .config
          
          make defconfig
          
          sed -i 's/CONFIG_PACKAGE_luci-app-fstab=y/# CONFIG_PACKAGE_luci-app-fstab is not set/g' .config
          sed -i 's/CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client=y/# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Client is not set/g' .config
          sed -i 's/CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Server=y/# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_ShadowsocksR_Libev_Server is not set/g' .config
          sed -i 's/CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus=y/# CONFIG_PACKAGE_luci-app-passwall_INCLUDE_Trojan_Plus is not set/g' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_EXT4FS=y/# CONFIG_TARGET_ROOTFS_EXT4FS is not set/g' .config
          
          ./scripts/diffconfig.sh > diffconfig.txt

      - name: Restore DL Cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-v41-25.12-${{ steps.var.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-dl-v41-25.12-
          enableCrossOsArchive: false

      - name: Restore CCache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-ccache-v41-25.12-${{ steps.var.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-ccache-v41-25.12-
          enableCrossOsArchive: false

      - name: Restore Go Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt/.gocache
            openwrt/.gomodcache
          key: ${{ runner.os }}-go-v41-25.12-${{ hashFiles('openwrt/.config') }}-${{ steps.var.outputs.week }}
          restore-keys: |
            ${{ runner.os }}-go-v41-25.12-${{ hashFiles('openwrt/.config') }}-
            ${{ runner.os }}-go-v41-25.12-
          enableCrossOsArchive: false

      - name: Build Firmware
        run: |
          set -euo pipefail
          source /tmp/sre_utils.sh
          
          trap 'echo "🚨 捕獲終止信號或執行結束，執行兜底清理協議..."; rm -rf build_dir/target-*/linux-x86_64/tmp || true' EXIT
          
          cd openwrt
          ulimit -n 8192
          export FORCE_UNSAFE_CONFIGURE=1
          export CCACHE_DIR="$PWD/.ccache"
          export PATH="/usr/lib/ccache:$PATH"
          
          export GOCACHE="$PWD/.gocache"
          export GOMODCACHE="$PWD/.gomodcache"
          export GOFLAGS="-modcacherw"
          # 🛡️ 絕對零度隔離：強制關閉系統 GOENV，避免 GitHub Runner 預設環境綁架編譯器
          export GOENV=off
          
          export OMP_NUM_THREADS=1
          export OPENBLAS_NUM_THREADS=1
          
          mkdir -p "$CCACHE_DIR" "$GOCACHE" "$GOMODCACHE"
          
          # 🛡️ 終極物理權限校準
          find "$GOCACHE" "$GOMODCACHE" -type d -exec chmod u+rwx {} \; || true
          find "$GOCACHE" "$GOMODCACHE" -type f -exec chmod u+rw {} \; || true
          
          ccache --max-size=5G
          ccache --set-config=compression=true
          ccache --set-config=sloppiness=file_macro,time_macros
          
          retry make download -j8
          
          find dl -type f -size 0 -exec rm -f {} \; || true
          
          AVAILABLE=$(df / | awk 'NR==2 {print $4}')
          if [ "$AVAILABLE" -lt 8388608 ]; then
            echo "❌ 可用磁盤低於 8GB，終止編譯！"
            exit 1
          fi
          
          ccache -z
          
          # 🎯 將雙引擎參數打穿沙盒
          make -j3 GOCACHE="$GOCACHE" GOMODCACHE="$GOMODCACHE" || {
            echo "=== 檢測到並發競爭報錯，啟動單核排隊編譯 ==="
            make -j1 V=s GOCACHE="$GOCACHE" GOMODCACHE="$GOMODCACHE"
          }
          
          echo "=== 🏆 編譯後 CCache 戰果 ==="
          ccache -s
          
          echo "=== 📦 終極防禦：Go 金庫容量監視器 ==="
          du -sh "$GOCACHE" "$GOMODCACHE" || true
          
      - name: Save DL Cache
        uses: actions/cache/save@v4
        if: success() && !cancelled()
        with:
          path: openwrt/dl
          key: ${{ runner.os }}-dl-v41-25.12-${{ steps.var.outputs.week }}
          enableCrossOsArchive: false

      - name: Save CCache
        uses: actions/cache/save@v4
        if: success() && !cancelled()
        with:
          path: openwrt/.ccache
          key: ${{ runner.os }}-ccache-v41-25.12-${{ steps.var.outputs.week }}
          enableCrossOsArchive: false

      - name: Save Go Cache
        uses: actions/cache/save@v4
        if: success() && !cancelled()
        with:
          path: |
            openwrt/.gocache
            openwrt/.gomodcache
          key: ${{ runner.os }}-go-v41-25.12-${{ hashFiles('openwrt/.config') }}-${{ steps.var.outputs.week }}
          enableCrossOsArchive: false

      - name: Validate Firmware Integrity
        run: |
          set -euo pipefail
          cd openwrt/bin/targets/x86/64/
          ls -lh *squashfs-combined*.img.gz || { echo "❌ 未能找到 squashfs 韌體文件！"; exit 1; }
          grep 'squashfs-combined.*\.img\.gz' sha256sums | sha256sum -c || { echo "❌ 韌體校驗和不匹配！"; exit 1; }
          echo "✅ 韌體 SHA256 完整性校驗通過"
          
      - name: Generate Release Tag & Provenance
        id: tag
        run: |
          set -euo pipefail
          echo "release_tag=v4.1.3-b${{ github.run_number }}-$(date +"%m%d")" >> $GITHUB_OUTPUT
          cd openwrt
          echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "os_info=$(uname -srm)" >> $GITHUB_OUTPUT
          echo "gcc_version=$(gcc --version | head -n1)" >> $GITHUB_OUTPUT
          
      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.release_tag }}
          name: ImmWrt v4.1.3 LTS (Absolute Zero CI) (Build ${{ github.run_number }})
          body: |
            ### 🚀 v4.1.3 生產級絕對零度版 (Absolute Zero CI)
            - **絕對零度隔離**：導入 `GOENV=off`，切斷一切來自 GitHub Runner 底層的環境變數綁架，實現 100% 絕對沙盒純淨度。
            - **終極物理權限校準**：升級 `find` 權限校準腳本，精準分離目錄與檔案的 executable bit，徹底防禦任何唯讀或越權報錯。
            - **系統級依賴防禦**：補全 `golang-go` 套件，徹底消除 OpenWrt `host-build` 階段找不到系統編譯器的潛在暴斃風險。
            - **容量監視儀表板**：實裝 `du -sh` 指令，全時監控 `.gocache` 與 `.gomodcache` 容量，預防 10GB 總量爆炸。
            - **哈希指紋隔離鎖**：為 Go 金庫掛載 `${{ hashFiles('openwrt/.config') }}` 動態標籤，確保套件增減時自動隔離，杜絕舊版污染。
          files: |
            openwrt/bin/targets/x86/64/*combined*.img.gz
            openwrt/bin/targets/x86/64/sha256sums
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Build Logs & Configs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: openwrt-build-data-${{ github.run_id }}
          path: |
            openwrt/diffconfig.txt
            openwrt/.config
            openwrt/bin/targets/x86/64/sha256sums
          retention-days: 7
