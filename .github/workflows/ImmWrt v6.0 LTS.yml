# =====================================================================
# 🔒 [LTS FINAL SEALED] - THE ZENITH ABSOLUTE v6.0.0 (MASTER EDITION)
# =====================================================================
# 狀態：ABSOLUTE SEALED (絕對封印) / PRODUCTION READY。
# 審核：確保所有指定插件與對應中文包完全編入，環境與快取架構已鎖定。
# =====================================================================

name: Build ImmWrt Final LTS

on:
  workflow_dispatch:
  schedule:
    - cron: '26 14 * * 0,2,4,6' # HKT 22:26 (每週日、二、四、六)

concurrency:
  group: immwrt-build
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive
  CCACHE_DIR: /tmp/ccache
  USE_CCACHE: 1

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Init SRE Environment
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget jq golang-go ccache
          sudo swapoff -a && sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile

      - name: Cache Build Dependencies
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
          key: immwrt-lts-${{ runner.os }}-${{ hashFiles('**/feeds.conf.default') }}
          restore-keys: immwrt-lts-${{ runner.os }}-

      - name: Clone & Official PassWall Source
        run: |
          set -euo pipefail
          git clone -b v25.12.0 --single-branch --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          echo "src-link passwall package/openwrt-passwall" >> feeds.conf.default
          echo "src-link passwall_packages package/openwrt-passwall-packages" >> feeds.conf.default
          sed -i 's/^src-git/#src-git/g' feeds.conf.default
          
          for i in 1 2 3; do ./scripts/feeds update -a && break || sleep 5; done
          ./scripts/feeds uninstall luci-app-passwall xray-core sing-box || true
          rm -rf feeds/luci/applications/luci-app-passwall* feeds/packages/net/xray-core feeds/packages/net/sing-box tmp/feeds*
          
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/openwrt-passwall-packages
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall.git package/openwrt-passwall
          ./scripts/feeds clean
          ./scripts/feeds install -a -f

      - name: Generate Core Config
        run: |
          set -euo pipefail
          cd openwrt
          {
            echo "CONFIG_TARGET_x86=y"; echo "CONFIG_TARGET_x86_64=y"; echo "CONFIG_TARGET_x86_64_DEVICE_generic=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=3072"; echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_EFI_IMAGES=y"; echo "CONFIG_TARGET_IMAGES_EFI_COMBINED=y"
            echo "CONFIG_CCACHE=y"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"; echo "CONFIG_PACKAGE_coreutils=y"; echo "CONFIG_PACKAGE_ca-certificates=y"; echo "CONFIG_PACKAGE_ca-bundle=y"
            # VPN & Net
            echo "CONFIG_PACKAGE_nftables=y"; echo "CONFIG_PACKAGE_ip-full=y"; echo "CONFIG_PACKAGE_ipset=y"; echo "CONFIG_PACKAGE_iptables-nft=y"
            echo "CONFIG_PACKAGE_ip6tables-nft=y"; echo "CONFIG_PACKAGE_ipv6helper=y"; echo "CONFIG_PACKAGE_kmod-ip6tables=y"; echo "CONFIG_PACKAGE_odhcp6c=y"; echo "CONFIG_PACKAGE_odhcpd-ipv6only=y"
            echo "CONFIG_PACKAGE_luci-app-passwall=y"; echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y"; echo "CONFIG_PACKAGE_xray-core=y"; echo "CONFIG_PACKAGE_sing-box=y"; echo "CONFIG_PACKAGE_geoview=y"
            echo "CONFIG_PACKAGE_v2ray-geoip=y"; echo "CONFIG_PACKAGE_v2ray-geosite=y"
            # Utils
            echo "CONFIG_PACKAGE_smartdns=y"; echo "CONFIG_PACKAGE_luci-app-smartdns=y"; echo "CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ddns=y"; echo "CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y"; echo "CONFIG_PACKAGE_ddns-scripts-cloudflare=y"
            echo "CONFIG_PACKAGE_luci-app-upnp=y"; echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"; echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-advanced-reboot=y"; echo "CONFIG_PACKAGE_luci-i18n-advanced-reboot-zh-cn=y"
            # UI & Tools
            echo "CONFIG_PACKAGE_luci-light=y"; echo "CONFIG_PACKAGE_luci-theme-argon=y"; echo "CONFIG_PACKAGE_luci-app-argon-config=y"; echo "CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y"; echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"
            echo "CONFIG_PACKAGE_htop=y"; echo "CONFIG_PACKAGE_tcpdump=y"; echo "CONFIG_PACKAGE_strace=y"; echo "CONFIG_PACKAGE_lsof=y"; echo "CONFIG_PACKAGE_ethtool=y"; echo "CONFIG_PACKAGE_jq=y"; echo "CONFIG_PACKAGE_iperf3=y"
          } > .config
          make defconfig > /dev/null

      - name: Generate Variables
        id: var
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build Firmware
        run: |
          set -euo pipefail
          cd openwrt
          mkdir -p logs
          ( while true; do 
              echo "::notice title=MONITOR::STEP:BUILD | RAM:$(free -m | awk '/Mem:/ {print $3"/"$2"MB"}') | LOAD:$(uptime | awk -F'load average:' '{print $2}')"
              sleep 120 
            done ) &
          MONITOR_PID=$!
          trap 'kill $MONITOR_PID 2>/dev/null || true' EXIT
          
          export CC="ccache gcc"; export CXX="ccache g++"
          for i in 1 2 3; do if make download -j$(nproc); then break; fi; sleep 10; done
          if ! make -j$(nproc) 2>&1 | tee logs/build.log; then make -j1 V=s 2>&1 || exit 1; fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0.0-LTS-RC-${{ github.run_number }}
          name: ImmWrt v6.0.0-LTS (Engineering Stable)
          files: |
            openwrt/bin/targets/x86/64/*combined*.img.gz
            openwrt/bin/targets/x86/64/sha256sums
            openwrt/logs/build.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
