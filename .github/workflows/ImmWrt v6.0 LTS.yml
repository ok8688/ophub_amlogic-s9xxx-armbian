# =====================================================================
# 🔒 [LTS FINAL SEALED] - THE ABSOLUTE FINALITY v6.0 (25.12.0 MASTER)
# =====================================================================
# 狀態：ABSOLUTE SEALED (絕對封存)。
# 審核：母版邏輯全量遷移，緩存閉環，雷達裝載。
# =====================================================================

name: Build ImmWrt v6.0-LTS

on:
  workflow_dispatch:
  schedule:
    - cron: '26 14 * * 0,2,4,6' # HKT 22:26 (每週日、二、四、六)

concurrency:
  group: immwrt-build
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Inject SRE Core Utilities
        run: |
          cat << 'EOF' > /tmp/sre_utils.sh
          #!/bin/bash
          retry() {
            local max=5
            local delay=2
            local n=1

            while true; do
              "$@" 2>> /tmp/retry_debug.log && break || {
                if [[ $n -lt $max ]]; then
                  echo "⚠️ [FAIL] Attempt $n: $@" >> /tmp/retry_history.log
                  ((n++))
                  delay=$((delay * 2 + RANDOM % 3))
                  sleep $delay
                else
                  exit 1
                fi
              }
            done
          }
          EOF

          chmod +x /tmp/sre_utils.sh

      - name: Init SRE Environment & Space Cleanup
        run: |
          set -euo pipefail

          echo "=== 💥 啟動究極核爆清理 (釋放極限空間) ==="

          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /usr/share/swift \
            /usr/local/lib/node_modules \
            /opt/hostedtoolcache/CodeQL \
            /opt/microsoft \
            /usr/local/share/edge_driver \
            /usr/local/.ghcup \
            /usr/share/miniconda \
            /opt/az

          sudo docker system prune -af || true
          sudo apt-get clean

          echo "=== 🚀 部署依賴與內存裝甲 ==="

          sudo apt-get update -qq

          sudo apt-get install -y \
            build-essential \
            clang \
            flex \
            bison \
            g++ \
            gawk \
            gcc-multilib \
            gettext \
            git \
            libncurses5-dev \
            libssl-dev \
            python3-distutils \
            rsync \
            unzip \
            zlib1g-dev \
            file \
            wget \
            jq \
            golang-go

          sudo swapoff -a || true
          sudo fallocate -l 4G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile

          echo "=== 🧬 Deep ABI Fingerprint ===" > toolchain.info
          uname -r >> toolchain.info
          gcc --version | head -n 1 >> toolchain.info
          ld --version | head -n 1 >> toolchain.info
          ldd --version | head -n 1 >> toolchain.info
          dpkg -s libc6 | grep Version >> toolchain.info
          go version >> toolchain.info || true

      - name: Clone & Official PassWall Main Source
        run: |
          set -euo pipefail
          source /tmp/sre_utils.sh

          retry git clone -b v25.12.0 --single-branch --depth 1 \
            https://github.com/immortalwrt/immortalwrt.git openwrt

          cd openwrt

          retry ./scripts/feeds update -a

          # ✅ 終極物理防護 - 徹底切斷舊版供應鏈
          ./scripts/feeds uninstall \
            luci-app-passwall \
            xray-core \
            sing-box \
            luci-app-upnp \
            luci-app-advanced-reboot || true

          rm -rf feeds/luci/applications/luci-app-passwall
          rm -rf feeds/packages/net/xray-core
          rm -rf feeds/packages/net/sing-box

          rm -rf package/feeds/luci/luci-app-passwall
          rm -rf package/feeds/packages/xray-core
          rm -rf package/feeds/packages/sing-box

          # 🚀 拉取官方最新 PassWall
          retry git clone --depth=1 \
            https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git \
            package/openwrt-passwall-packages

          retry git clone --depth=1 \
            https://github.com/Openwrt-Passwall/openwrt-passwall.git \
            package/openwrt-passwall

          retry ./scripts/feeds install -a -f

          # 🚀 v3.38f 黃金定點抹除法 (掛載點)
          ./scripts/feeds uninstall luci-app-fstab || true

          rm -rf feeds/luci/applications/luci-app-fstab
          rm -rf package/feeds/luci/luci-app-fstab

          MENU_DIR="feeds/luci/modules/luci-mod-system/root/usr/share/luci/menu.d"

          if [ -d "$MENU_DIR" ]; then
            for f in $MENU_DIR/*.json; do
              [ -f "$f" ] || continue

              jq 'del(."admin/system/mounts", ."admin/services/mounts")' \
                "$f" > "$f.tmp" && mv "$f.tmp" "$f" || true
            done
          fi

          find feeds package -type d -name ".git" -print0 | while IFS= read -r -d '' gitdir; do
            repo_path=$(dirname "$gitdir")
            repo_root=$(git -C "$repo_path" rev-parse --show-toplevel 2>/dev/null || true)

            [ -n "$repo_root" ] && \
              echo "commit: $(git -C "$repo_root" rev-parse HEAD) $repo_root"
          done | sort -u > feeds.snapshot.txt

      - name: Generate Core Config (v3.36s List)
        run: |
          set -euo pipefail

          cd openwrt

          {
            echo "CONFIG_TARGET_x86=y"
            echo "CONFIG_TARGET_x86_64=y"
            echo "CONFIG_TARGET_x86_64_DEVICE_generic=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1536"
            echo "CONFIG_TARGET_IMAGES_GZIP=y"

            echo "CONFIG_PACKAGE_luci-app-passwall=y"
            echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y"
            echo "CONFIG_PACKAGE_xray-core=y"
            echo "CONFIG_PACKAGE_sing-box=y"
            echo "CONFIG_PACKAGE_geoview=y"
            echo "CONFIG_PACKAGE_ca-bundle=y"
            echo "CONFIG_PACKAGE_ca-certificates=y"

            echo "CONFIG_PACKAGE_smartdns=y"
            echo "CONFIG_PACKAGE_luci-app-smartdns=y"
            echo "CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y"

            echo "CONFIG_PACKAGE_luci-app-ddns=y"
            echo "CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y"
            echo "CONFIG_PACKAGE_ddns-scripts-cloudflare=y"

            echo "CONFIG_PACKAGE_luci-app-upnp=y"
            echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y"

            echo "CONFIG_PACKAGE_luci-light=y"
            echo "CONFIG_PACKAGE_luci-theme-argon=y"
            echo "CONFIG_PACKAGE_luci-app-argon-config=y"
            echo "CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"

            echo "CONFIG_PACKAGE_qemu-ga=y"
            echo "CONFIG_PACKAGE_irqbalance=y"

            echo "CONFIG_PACKAGE_luci-app-ttyd=y"
            echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"

            echo "CONFIG_PACKAGE_luci-app-advanced-reboot=y"
            echo "CONFIG_PACKAGE_luci-i18n-advanced-reboot-zh-cn=y"

            echo "CONFIG_PACKAGE_htop=y"
            echo "CONFIG_PACKAGE_ethtool=y"
            echo "CONFIG_PACKAGE_nano=y"
            echo "CONFIG_PACKAGE_curl=y"
            echo "CONFIG_PACKAGE_wget-ssl=y"
            echo "CONFIG_PACKAGE_unzip=y"

            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"
            echo "CONFIG_PACKAGE_kmod-virtio-net=y"
            echo "CONFIG_PACKAGE_kmod-virtio-blk=y"
            echo "CONFIG_PACKAGE_kmod-nft-offload=y"

            echo "CONFIG_PACKAGE_block-mount=n"
            echo "CONFIG_PACKAGE_luci-app-fstab=n"

            # 🛑 關閉 ccache
            echo "# CONFIG_CCACHE is not set"

          } > .config

          make defconfig

          ./scripts/diffconfig.sh > diffconfig.txt

      - name: Generate Cache Variables
        id: var
        run: |
          echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "dl_key=dl-v6.0-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/feeds.snapshot.txt') }}" >> $GITHUB_OUTPUT

      - name: Restore Cache
        id: cache_restore
        uses: actions/cache/restore@v4
        with:
          path: |
            openwrt/dl
          key: ${{ steps.var.outputs.dl_key }}
          restore-keys: |
            dl-v6.0-

      - name: Build Firmware
        run: |
          set -euo pipefail

          source /tmp/sre_utils.sh

          cd openwrt

          mkdir -p logs

          [ -f feeds.snapshot.txt ] && \
            cp feeds.snapshot.txt logs/snapshot.sbom || true

          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct || date +%s)

          # ==========================================
          # 📡 啟動 SRE 駕駛艙雷達
          # ==========================================

          MONITOR_PID=""

          cleanup_monitor() {
            echo "🧹 關閉駕駛艙雷達..."
            [ -n "$MONITOR_PID" ] && kill "$MONITOR_PID" 2>/dev/null || true
          }

          trap cleanup_monitor EXIT INT TERM

          (
            echo "📡 BUILD MONITOR START"

            while true; do
              echo "[MONITOR] $(date '+%H:%M:%S') | RAM: $(free -m | awk '/Mem:/ {print $3"/"$2"MB"}') | DISK: $(df -h / | awk 'NR==2 {print $5}')"
              sleep 120 || true
            done
          ) &

          MONITOR_PID=$!

          # ==========================================

          for i in 1 2 3; do
            make download -j$(nproc) && break || {
              sleep $((i * 5))
            }

            [ $i -eq 3 ] && make download -j1 V=s
          done

          if ! make -j$(nproc) 2>&1 | tee logs/build.log; then
            rm -rf tmp build_dir/hostpkg staging_dir/hostpkg

            make -j1 V=s 2>&1 | tee logs/build-debug.log || exit 1
          fi

      - name: Save Cache
        uses: actions/cache/save@v4
        if: success() && !cancelled()
        with:
          path: |
            openwrt/dl
          key: ${{ steps.var.outputs.dl_key }}

      - name: Validate & Final SBOM
        run: |
          set -euo pipefail

          cd openwrt/bin/targets/x86/64/

          find . -name "*combined*.img.gz" -type f | sort | \
            xargs sha256sum > manifest.txt || true

          sha256sum --ignore-missing -c sha256sums || true

          mv manifest.txt ../../../../logs/ || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0-LTS-b${{ github.run_number }}-${{ steps.var.outputs.date }}
          name: ImmWrt v6.0-LTS (The Absolute Finality)

          body: |
            ### 🔒 v6.0-LTS ABSOLUTE FINALITY

            - **25.12.0 正式版對齊**：全面切換至 ImmortalWrt 25.12.0 正式版母體。
            - **防爆盤矩陣**：核爆清理 Android/Docker/CodeQL，確保極限空間。
            - **SRE 雷達監控**：背景心跳 + RAM/DISK 探針，防禦 GitHub 靜默超時。
            - **極端容錯架構**：300 分鐘超時緩衝 + make 降級單核防禦。
            - **官方 PassWall 直連**：物理抹除 feeds 舊版源碼，確保官方最新源。
            - **全量中文化覆蓋**：完整 LuCI 中文後台與 Argon 中文化。

          files: |
            openwrt/bin/targets/x86/64/*combined*.img.gz
            openwrt/bin/targets/x86/64/sha256sums
            openwrt/logs/manifest.txt
            openwrt/logs/snapshot.sbom

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
