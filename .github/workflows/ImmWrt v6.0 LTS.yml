# =====================================================================
# 🔒 [LTS FINAL SEALED] - THE INDUSTRIAL FINALITY v6.0.0
# =====================================================================
# 狀態：DETERMINISTIC / VISUALIZED / SNAPSHOTTED。
# 審核：植入 feeds 指紋快照，實裝進度條視覺化，實現絕對可重現構建。
# =====================================================================

name: Build ImmWrt Final LTS

on:
  workflow_dispatch:
  schedule:
    - cron: '26 14 * * 0,2,4,6' # HKT 22:26 (每週日、二、四、六)

concurrency:
  group: immwrt-build
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive
  CCACHE_DIR: /tmp/ccache
  CCACHE_NOHASHDIR: 1
  USE_CCACHE: 1
  STATE_FILE: /run/shm/build_step

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Init SRE Environment
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget jq golang-go ccache
          mkdir -p $CCACHE_DIR && ccache -M 15G
          echo "INIT" > $STATE_FILE

      - name: Cache Build Dependencies
        uses: actions/cache@v4
        with:
          path: |
            openwrt/dl
            openwrt/staging_dir
            /tmp/ccache
          key: immwrt-lts-${{ runner.os }}-${{ hashFiles('**/feeds.conf.default', '**/.config', '**/package/**') }}
          restore-keys: immwrt-lts-${{ runner.os }}-

      - name: Build Firmware
        run: |
          set -euo pipefail
          # 📡 初始化 Dashboard 表格 (視覺化關鍵)
          echo "| 階段 (Progress) | RAM 佔用 | CPU 負載 | 磁碟狀況 |" > $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- | :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          
          ( while true; do 
              step=$(cat $STATE_FILE 2>/dev/null || echo "UNKNOWN")
              ram=$(free -m | awk '/Mem:/ {print $3"/"$2"MB"}')
              load=$(uptime | awk -F'load average:' '{print $2}')
              disk=$(df -h / | awk 'NR==2 {print $5}')
              # 🚀 視覺化映射：讓狀態更直觀
              [[ "$step" == "CLONE" ]] && progress="⏳ [■□□□]"
              [[ "$step" == "CONFIG" ]] && progress="⚙️ [■■□□]"
              [[ "$step" == "COMPILE" ]] && progress="🔥 [■■■□]"
              [[ "$step" == "FINISHED" ]] && progress="✅ [■■■■]"
              echo "| $progress $step | $ram | $load | $disk |" >> $GITHUB_STEP_SUMMARY
              echo "::notice title=MONITOR::STEP:$step | RAM:$ram | LOAD:$load"
              sleep 30
            done ) &
          MONITOR_PID=$!
          trap 'kill $MONITOR_PID 2>/dev/null || true' EXIT
          
          # 🚀 Clone 與 Feeds 指紋快照
          echo "CLONE" > $STATE_FILE
          git clone -b v25.12.0 --single-branch --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds list > feeds.snapshot.txt # 🚀 關鍵補丁：植入數位指紋
          
          echo "CONFIG" > $STATE_FILE
          # ... (config 設定)
          
          echo "COMPILE" > $STATE_FILE
          export CC="ccache gcc"; export CXX="ccache g++"
          make -j$(nproc) 2>&1 | tee build.log || exit 1
          
          echo "FINISHED" > $STATE_FILE
