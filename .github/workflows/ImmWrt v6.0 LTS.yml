# =====================================================================
# 🔒 [LTS FINAL SEALED] - THE ABSOLUTE FINALITY v6.0 (25.12.0 MASTER)
# =====================================================================
# 狀態：ABSOLUTE SEALED (絕對封存)。
# 審核：母版邏輯全量遷移，緩存閉環，雷達裝載。
# =====================================================================

name: Build ImmWrt v6.0-LTS

on:
  workflow_dispatch:
  schedule:
    - cron: '26 14 * * 0,2,4,6' # HKT 22:26 (每週日、二、四、六)

concurrency:
  group: immwrt-build-v6
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 300
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Inject SRE Core Utilities
        run: |
          cat << 'EOF' > /tmp/sre_utils.sh
          #!/bin/bash
          retry() {
            local max=5; local delay=2; local n=1
            while true; do
              "$@" 2>> /tmp/retry_debug.log && break || {
                if [[ $n -lt $max ]]; then
                  echo "⚠️ [FAIL] Attempt $n: $@" >> /tmp/retry_history.log
                  ((n++)); delay=$((delay * 2 + RANDOM % 3))
                  sleep $delay
                else
                  exit 1
                fi
              }
            done
          }
          EOF
          chmod +x /tmp/sre_utils.sh

      - name: Init SRE Environment & Space Cleanup
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL /opt/microsoft /usr/local/share/edge_driver /usr/local/.ghcup /usr/share/miniconda /opt/az
          sudo docker system prune -af || true
          sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-distutils rsync unzip zlib1g-dev file wget jq golang-go
          sudo swapoff -a || true && sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile

      - name: Clone & Official PassWall Main Source
        run: |
          set -euo pipefail
          source /tmp/sre_utils.sh
          retry git clone -b v25.12.0 --single-branch --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          retry ./scripts/feeds update -a
          
          ./scripts/feeds uninstall luci-app-passwall xray-core sing-box luci-app-upnp luci-app-advanced-reboot || true
          rm -rf feeds/luci/applications/luci-app-passwall package/feeds/luci/luci-app-passwall
          
          retry git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/openwrt-passwall-packages
          retry git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall.git package/openwrt-passwall
          retry ./scripts/feeds install -a -f
          
          ./scripts/feeds uninstall luci-app-fstab || true
          MENU_DIR="feeds/luci/modules/luci-mod-system/root/usr/share/luci/menu.d"
          [ -d "$MENU_DIR" ] && find "$MENU_DIR" -name "*.json" -exec jq 'del(."admin/system/mounts", ."admin/services/mounts")' {} > {}.tmp \; -exec mv {}.tmp {} \; || true
          
          find feeds package -type d -name ".git" -print0 | while IFS= read -r -d '' gitdir; do
            repo_path=$(dirname "$gitdir")
            repo_root=$(git -C "$repo_path" rev-parse --show-toplevel 2>/dev/null || true)
            [ -n "$repo_root" ] && echo "commit: $(git -C "$repo_root" rev-parse HEAD) $repo_root"
          done | sort -u > feeds.snapshot.txt

      - name: Generate Core Config
        run: |
          set -euo pipefail
          cd openwrt
          {
            echo "CONFIG_TARGET_x86=y"; echo "CONFIG_TARGET_x86_64=y"; echo "CONFIG_TARGET_x86_64_DEVICE_generic=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=1536"; echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_PACKAGE_luci-app-passwall=y"; echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y"
            echo "CONFIG_PACKAGE_xray-core=y"; echo "CONFIG_PACKAGE_sing-box=y"; echo "CONFIG_PACKAGE_geoview=y"
            echo "CONFIG_PACKAGE_smartdns=y"; echo "CONFIG_PACKAGE_luci-app-smartdns=y"; echo "CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ddns=y"; echo "CONFIG_PACKAGE_ddns-scripts-cloudflare=y"
            echo "CONFIG_PACKAGE_luci-app-upnp=y"; echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-theme-argon=y"; echo "CONFIG_PACKAGE_luci-app-argon-config=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"; echo "CONFIG_PACKAGE_luci-app-advanced-reboot=y"
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"; echo "CONFIG_PACKAGE_htop=y"; echo "CONFIG_PACKAGE_curl=y"
            echo "# CONFIG_CCACHE is not set"
          } > .config
          make defconfig

      - name: Generate Cache Variables
        id: var
        run: |
          echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT
          echo "dl_key=dl-v6.0-${{ hashFiles('openwrt/feeds.conf.default', 'openwrt/feeds.snapshot.txt') }}" >> $GITHUB_OUTPUT

      - name: Restore Cache
        uses: actions/cache/restore@v4
        with:
          path: openwrt/dl
          key: ${{ steps.var.outputs.dl_key }}
          restore-keys: dl-v6.0-

      - name: Build Firmware with SRE Radar
        run: |
          set -euo pipefail
          source /tmp/sre_utils.sh
          cd openwrt
          mkdir -p logs
          [ -f feeds.snapshot.txt ] && cp feeds.snapshot.txt logs/snapshot.sbom || true
          export SOURCE_DATE_EPOCH=$(git log -1 --format=%ct || date +%s)
          
          MONITOR_PID=""
          (while true; do echo "[MONITOR] $(date '+%H:%M:%S') | RAM: $(free -m | awk '/Mem:/ {print $3"/"$2"MB"}') | DISK: $(df -h / | awk 'NR==2 {print $5}')"; sleep 120 || true; done) &
          MONITOR_PID=$!
          trap 'kill $MONITOR_PID 2>/dev/null' EXIT
          
          for i in 1 2 3; do make download -j$(nproc) && break || sleep $((i * 5)); done
          if ! make -j$(nproc) 2>&1 | tee logs/build.log; then
            rm -rf tmp build_dir/hostpkg staging_dir/hostpkg
            make -j1 V=s 2>&1 | tee logs/build-debug.log || exit 1
          fi

      - name: Save Cache
        uses: actions/cache/save@v4
        if: success() && !cancelled()
        with:
          path: openwrt/dl
          key: ${{ steps.var.outputs.dl_key }}

      - name: Validate & Final SBOM
        run: |
          set -euo pipefail
          cd openwrt/bin/targets/x86/64/
          find . -name "*combined*.img.gz" -type f | sort | xargs sha256sum > manifest.txt || true
          sha256sum --ignore-missing -c sha256sums || true
          mv manifest.txt ../../../../logs/ || true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0-LTS-b${{ github.run_number }}-${{ steps.var.outputs.date }}
          name: ImmWrt v6.0-LTS (25.12.0 Master)
          body: |
            ### 🚀 v6.0-LTS 究極大成版 (基於 ImmortalWrt 25.12.0)
            - **核心升級**：ImmortalWrt 25.12.0 正式版內核。
            - **穩定閉環**：延續 v5.1.5 的 SRE 防禦與硬體監控架構。
            - **緩存修復**：補全 Cache 完整生命週期與 SBOM 溯源機制。
          files: |
            openwrt/bin/targets/x86/64/*combined*.img.gz
            openwrt/bin/targets/x86/64/sha256sums
            openwrt/logs/manifest.txt
            openwrt/logs/snapshot.sbom
