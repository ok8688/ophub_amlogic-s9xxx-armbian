# =====================================================================
# 🔒 [LTS FINAL SEALED] - THE ZENITH ABSOLUTE v6.0.0
# =====================================================================
# 狀態：ABSOLUTE SEALED (絕對封印) / PRODUCTION READY。
# 審核：修正 src-link 路徑、實裝監控進程鎖定、完善 IPv6 生產級鏈路、強化 artifacts 追溯。
# =====================================================================

name: Build ImmWrt Final LTS

on:
  workflow_dispatch:
  schedule:
    - cron: '26 14 * * 0,2,4,6' # HKT 22:26

concurrency:
  group: immwrt-build
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360
    
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Init SRE Environment
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/share/swift /usr/local/lib/node_modules /opt/hostedtoolcache/CodeQL /opt/microsoft /usr/local/share/edge_driver /usr/local/.ghcup /usr/share/miniconda /opt/az
          sudo apt-get update -qq && sudo apt-get install -y build-essential clang flex bison g++ gawk gcc-multilib gettext git libncurses5-dev libssl-dev python3-setuptools rsync unzip zlib1g-dev file wget jq golang-go
          sudo swapoff -a && sudo fallocate -l 4G /swapfile && sudo chmod 600 /swapfile && sudo mkswap /swapfile && sudo swapon /swapfile

      - name: Clone & Official PassWall Source
        run: |
          set -euo pipefail
          git clone -b v25.12.0 --single-branch --depth 1 https://github.com/immortalwrt/immortalwrt.git openwrt
          cd openwrt
          
          # 🚀 絕對路徑封印
          echo "src-link passwall package/openwrt-passwall" >> feeds.conf.default
          echo "src-link passwall_packages package/openwrt-passwall-packages" >> feeds.conf.default
          sed -i 's/^src-git/#src-git/g' feeds.conf.default
          
          ./scripts/feeds update -a
          ./scripts/feeds uninstall luci-app-passwall xray-core sing-box || true
          rm -rf feeds/luci/applications/luci-app-passwall* feeds/packages/net/xray-core feeds/packages/net/sing-box
          
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git package/openwrt-passwall-packages
          git clone --depth=1 https://github.com/Openwrt-Passwall/openwrt-passwall.git package/openwrt-passwall
          
          ./scripts/feeds install -a -f
          
          rm -rf package/feeds/luci/luci-app-passwall* package/feeds/packages/xray-core package/feeds/packages/sing-box
          ./scripts/feeds uninstall luci-app-fstab || true

      - name: Generate Core Config
        run: |
          set -euo pipefail
          cd openwrt
          {
            echo "CONFIG_TARGET_x86=y"; echo "CONFIG_TARGET_x86_64=y"; echo "CONFIG_TARGET_x86_64_DEVICE_generic=y"
            echo "CONFIG_TARGET_ROOTFS_PARTSIZE=3072"; echo "CONFIG_TARGET_IMAGES_GZIP=y"
            echo "CONFIG_EFI_IMAGES=y"; echo "CONFIG_TARGET_IMAGES_EFI_COMBINED=y"
            echo "CONFIG_PACKAGE_kmod-virtio-scsi=y"; echo "CONFIG_PACKAGE_kmod-virtio-pci=y"
            echo "CONFIG_PACKAGE_kmod-virtio-blk=y"; echo "CONFIG_PACKAGE_kmod-virtio-net=y"
            echo "CONFIG_PACKAGE_dnsmasq-full=y"; echo "# CONFIG_PACKAGE_dnsmasq is not set"
            echo "CONFIG_PACKAGE_coreutils=y"; echo "CONFIG_PACKAGE_coreutils-nohup=y"
            echo "CONFIG_PACKAGE_libustream-openssl=y"; echo "CONFIG_PACKAGE_openssl-util=y"
            echo "CONFIG_PACKAGE_lsblk=y"; echo "CONFIG_PACKAGE_blockdev=y"
            echo "CONFIG_PACKAGE_apk=y"; echo "CONFIG_PACKAGE_liblua=y"
            echo "CONFIG_PACKAGE_pciutils=y"; echo "CONFIG_PACKAGE_usbutils=y"; echo "CONFIG_PACKAGE_tcpdump=y"
            echo "CONFIG_PACKAGE_strace=y"; echo "CONFIG_PACKAGE_lsof=y"; echo "CONFIG_PACKAGE_nftables=y"
            echo "CONFIG_PACKAGE_kmod-nft-core=y"; echo "CONFIG_PACKAGE_kmod-nft-nat=y"
            echo "CONFIG_PACKAGE_kmod-nft-fib=y"; echo "CONFIG_PACKAGE_kmod-nft-tproxy=y"
            echo "CONFIG_PACKAGE_ip-full=y"; echo "CONFIG_PACKAGE_ipset=y"; echo "CONFIG_PACKAGE_iptables-nft=y"
            echo "CONFIG_PACKAGE_ip6tables-nft=y"; echo "CONFIG_PACKAGE_ipv6helper=y"; echo "CONFIG_PACKAGE_kmod-ip6tables=y"
            echo "CONFIG_PACKAGE_odhcp6c=y"; echo "CONFIG_PACKAGE_odhcpd-ipv6only=y"
            echo "CONFIG_PACKAGE_luci-app-passwall=y"; echo "CONFIG_PACKAGE_luci-i18n-passwall-zh-cn=y"
            echo "CONFIG_PACKAGE_xray-core=y"; echo "CONFIG_PACKAGE_sing-box=y"; echo "CONFIG_PACKAGE_geoview=y"
            echo "CONFIG_PACKAGE_ca-bundle=y"; echo "CONFIG_PACKAGE_ca-certificates=y"; echo "CONFIG_PACKAGE_smartdns=y"
            echo "CONFIG_PACKAGE_luci-app-smartdns=y"; echo "CONFIG_PACKAGE_luci-i18n-smartdns-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-ddns=y"; echo "CONFIG_PACKAGE_luci-i18n-ddns-zh-cn=y"
            echo "CONFIG_PACKAGE_ddns-scripts-cloudflare=y"; echo "CONFIG_PACKAGE_luci-app-upnp=y"
            echo "CONFIG_PACKAGE_luci-i18n-upnp-zh-cn=y"; echo "CONFIG_PACKAGE_luci-light=y"
            echo "CONFIG_PACKAGE_luci-theme-argon=y"; echo "CONFIG_PACKAGE_luci-app-argon-config=y"
            echo "CONFIG_PACKAGE_luci-i18n-argon-config-zh-cn=y"; echo "CONFIG_PACKAGE_luci-i18n-base-zh-cn=y"
            echo "CONFIG_PACKAGE_qemu-ga=y"; echo "CONFIG_PACKAGE_irqbalance=y"; echo "CONFIG_PACKAGE_luci-app-irqbalance=y"
            echo "CONFIG_PACKAGE_luci-app-ttyd=y"; echo "CONFIG_PACKAGE_luci-i18n-ttyd-zh-cn=y"
            echo "CONFIG_PACKAGE_luci-app-advanced-reboot=y"; echo "CONFIG_PACKAGE_luci-i18n-advanced-reboot-zh-cn=y"
            echo "CONFIG_PACKAGE_htop=y"; echo "CONFIG_PACKAGE_ethtool=y"; echo "CONFIG_PACKAGE_nano=y"
            echo "CONFIG_PACKAGE_curl=y"; echo "CONFIG_PACKAGE_wget-ssl=y"; echo "CONFIG_PACKAGE_unzip=y"
            echo "CONFIG_PACKAGE_kmod-tcp-bbr=y"; echo "CONFIG_PACKAGE_kmod-nft-offload=y"
            echo "CONFIG_PACKAGE_block-mount=n"; echo "CONFIG_PACKAGE_luci-app-fstab=n"
            echo "# CONFIG_CCACHE is not set"
          } > .config
          make defconfig > /dev/null

      - name: Generate Variables
        id: var
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_OUTPUT

      - name: Build Firmware
        run: |
          set -euo pipefail
          cd openwrt
          mkdir -p logs
          # 🚀 企業級監控日誌雙軌制
          ( while true; do echo "[MONITOR] RAM: $(free -m | awk '/Mem:/ {print $3"/"$2"MB"}') | DISK: $(df -h / | awk 'NR==2 {print $5}')" | tee -a logs/monitor.log; sleep 120; done ) &
          MONITOR_PID=$!
          trap 'kill $MONITOR_PID 2>/dev/null || true' EXIT
          
          for i in 1 2 3; do if make download -j$(nproc); then break; fi; sleep 10; done
          if ! make -j$(nproc) 2>&1 | tee logs/build.log; then make -j1 V=s 2>&1 || exit 1; fi

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0.0-LTS-b${{ github.run_number }}-${{ steps.var.outputs.date }}
          name: ImmWrt v6.0.0-LTS (The Zenith Absolute)
          files: |
            openwrt/bin/targets/x86/64/*combined*.img.gz
            openwrt/bin/targets/x86/64/sha256sums
            openwrt/logs/build.log
            openwrt/logs/monitor.log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
